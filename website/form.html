<html>
    <head>
        <title>Login Registration form</title>
       <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="login-page">
            <div class="form">
                <form class="registration-form"><br><br>
                    <input type="text" placeholder="user name" required><br><br>
                    <input type="password" placeholder="password" required><br><br>
                    <input type="email" placeholder="email id" required><br><br>
                    <input type="text" placeholder="mobile" required><br><br>
                    <button>submit</button>
                    <p class="message">Already Registered ? <a href="#">/login</a>
                    </p>
                </form>
                <form class="login-form"><br><br>
                    <input type="email" placeholder="email id" required><br><br>
                    <input type="password" placeholder="password" required><br><br>
                     <button>login</button>
                     <p class="message">Not Registered ? <a href="#">/register</a></p>
                </form>
            </div>
        </div>
        <script src='https://code.jquery.com/jquery-3.4.1.min.js'></script>
        <script>
            $( '.message a').click(function(){
                $('form').animate({height:"toggle", opacity:"toggle"},"slow");
                
            });
        </script>
    </body>
</html>
