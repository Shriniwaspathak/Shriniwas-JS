<script>
    let arr=[4,8,12,20,6];
    arr.sort(compareNumber);
    console.log(arr);

    function compareNumber(num1,num2){
        if(num1>num2){
          return 1;
         } 
         if(num1==num2){
          return 0;
      } 
      if(num1<num2){
          return -1;
      }
    }

</script>
