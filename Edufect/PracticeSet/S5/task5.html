<script>
    let str="JobReadyJava";
    let strEven='';
    let strOdd='';
    for(let i=0;i<str.length;i++){
        let ch=str.charAt(i);
        if(i%2==0){
            strEven+=ch;
        }else{
            strOdd+=ch;
        }
    }
    console.log(`Odd :${strOdd} \nEven :${strEven}`);
</script>
