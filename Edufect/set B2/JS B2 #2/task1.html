            let product1="<div class='cell'>"+Product[i]+"</div>";
            let code1="<div class='cell'>"+code[i]+"</div>";

            str =str+row;
        }else{
            let product1="<div class='cells'>"+Product[i]+"</div>";
            let code1="<div class='cells'>"+code[i]+"</div>";
            let price1="<div class='cell1s'>"+price[i]+"</div>";
            let quantity1="<div class='cell1s'>"+quantity[i]+"</div>";
            let row='<div>'+product1+code1+price1+quantity1+'</div>';
            str =str+row;
        }
        }
        console.log(str);
        let element=document.createElement('div');
