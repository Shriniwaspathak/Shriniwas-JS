<script>
    let arr=["Hello","React","Java","Python","Hibernate", "JavaScript"];
        let ch1='A',ch2='J',ch3='R'
        var str='';
    let allcourse=arr.reduce((acc,curr)=>funCourse(acc,curr,ch1,ch2,ch3));
    console.log(allcourse);

           function funCourse(acc,curr,ch1,ch2,ch3){

               if(curr.charAt(0)===ch1){
                   str+=curr+"-"+0+' ';
               }else if(curr.charAt(0)===ch2){
                   str+=curr+"-"+2+' ';
               }else if(curr.charAt(0)===ch3){
                   str+=curr+"-"+1+' ';
           }
           return str;
           }

               
    
</script>
