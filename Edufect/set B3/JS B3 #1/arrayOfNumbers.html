<script>
    let numbers=[-25,-8,-6,4,5,10,100];
    console.log(numbers);
    numbers.sort(compareNumber);
    console.log(numbers);

     function compareNumber(num1,num2){
         if(num1<0){
             num1=num1 *-1;
         } 
          if(num2<0){
             num2=num2*-1;
         } 
          if(num1>num2){
          return 1;
         } 
         if(num1==num2){
          return 0;
      } 
      if(num1<num2){
          return -1;
      }
 }
</script>
