<script>
    let num=11;
    document.write("Number is ",num,"<br/>");
    if(num>5){
        document.write("num is greater than 5 <br/>");
    }
    else{
        document.write("num is less than or equal 5 <br/>");
    }
    let rem=num%2;  
    if(rem==0){
        document.write("num is an even nummber <br/>");
    }
    else{
        document.write("num is an odd nummber <br/>");
    }

</script>
