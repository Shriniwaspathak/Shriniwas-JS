<script>
     let n=99;
    document.write("Number = ",n,"<br/>");
    let rem=n%10;
    if(rem==0){
        document.write("Multiple of 10 <br/>");
        console.log("Multiple of 10 ");
    }
    else{
        document.write("Not a Multiple of 10  <br/>");
        console.log("Not a Multiple of 10 ");
    }
</script>
