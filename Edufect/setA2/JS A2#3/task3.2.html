<html>
<head></head>
<body>
<div id="showCount"></div>
<button onclick="CountFun()">Double</button>
<button onclick="Reset()">Reset</button>
</body>

<script>
    var count=0;
    function CountFun(){
     count=count+1;  
     var countNum=document.getElementById("showCount");
     countNum.innerHTML=count ;

    }
    function Reset(){
         countNum=document.getElementById("showCount");
         countNum.innerHTML=11;
    }
  </script>
  </html>
