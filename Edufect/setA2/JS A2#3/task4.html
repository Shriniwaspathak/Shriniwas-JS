<script>
    var n=8;
   var str="";
   var num=0;
   for(let i=1;i<=n;i++){
       if(i%3==1){
           num=num+1;
           str=str+'P'+num;
       } 
        else if(i%3==2){
            num=num+1;
           str=str+'Q'+num;    
       }  
       else{
           num=num+1;
           str=str+'R'+num;
       }
       console.log(str);      
   }
   
 
</script>
