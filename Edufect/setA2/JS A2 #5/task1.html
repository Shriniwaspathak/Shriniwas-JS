<html>
    <head>
        <link rel="stylesheet" href="task1Style.css">
    </head>
    <body>
        <button class="btn" onclick="fun1()">JavaScript</button><br>

        <button class="btn2" onclick="func4()">Reset</button><br>
        <div  id="textmsg"></div>
      
    </body>
    <script>
     function fun1(){
         let ele =document.getElementById('textmsg');
         ele.innerHTML="JavaScript is the centre of all web apps";
        ele.className="txtjs";
     }
     function fun2(){
         let ele=document.getElementById('textmsg');
         ele.innerHTML="React is a liabrary developed by Facebook";
         ele.className="txtreact";
     }
     function fun3(){
         let ele=document.getElementById('textmsg');
         ele.innerHTML="Angular is a framework supported by Google";
         ele.className="txtangular";
     }
     function func4(){  
         let ele=document.getElementById('textmsg');
         ele.innerHTML="";
     }
    </script>
</html>
