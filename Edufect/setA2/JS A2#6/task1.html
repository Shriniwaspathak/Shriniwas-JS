<html>
    <head></head>
    <body>
        <button onclick="power()">Next Power of 2</button><br>
    </body>
    <script>
        var x=1;
        function power(){
            let ele=document.createElement("div");
            ele.innerHTML=x;
            x=x*2;
            document.body.appendChild(ele);
        }
    </script>
</html>
