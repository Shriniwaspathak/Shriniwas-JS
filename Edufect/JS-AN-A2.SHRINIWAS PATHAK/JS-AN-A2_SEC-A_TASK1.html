<html>
<head></head>
<body>
    Enter String:<input type="text" id="txt"><br>
    <button onclick="showString()">click Here</button>
</body>
<script>
    var count=0;
    function showString(){
        let str=document.getElementById("txt").value;
          let len=str.length;
        for(let i=0;i<len;i++){
            if(str.charAt(i)==' '){
                count++;
            }
        }
        count++;
        console.log("Number of words =",count);
        let str1="";
        let count1=1;
        for(let i=0;i<len;i++){
            if(str.charAt(i)!=' '){
                str1=str1+str.charAt(i);
            }
            else{
                console.log(count1+'.',str1);
                str1="";
                count1++;
            }
        }
        console.log(count1+'.',str1);
    }
</script>
</html>
