   <select  id="dd01">

   </select>

    <script>
        addDD();
      function showSelect(){
          let dd=document.getElementById('dd01').value;

      function addDD(){
          let myDD=document.createElement('select');
          myDD.setAttribute('id',"mydd");
          let option1='<Option>iOS</option>'
            let option2='<Option>Android</option>'
            options=option1+option2;
            myDD.innerHTML=options
            document.body.appendChild(myDD);
      }
