<html>
    <head></head>
    <body>
        <button onclick="btn1()">Form1</button>
        <button onclick="btn2()">Form2</button>
    </body>
    <script>
        function btn1(){
         let form1=document.getElementById('form1');
         let form2=document.getElementById('form2');
       if(form2!=null){
           document.body.removeChild(form2);
       }
       if(form1!=null){
           return;
       }
            let ele=document.createElement('div');
            ele.setAttribute('id','form1');
            let txt1=document.createElement('input');
            txt1.type='text';
            txt1.setAttribute('id','txt101');
            txt1.setAttribute('placeholder','Enter Name');
            ele.appendChild(txt1);
            let btn=document.createElement('button');
            btn.setAttribute('onclick','display1()');
            btn.setAttribute('class','mybtnstyle');
            btn.innerText='Get Name';
            ele.appendChild(btn);
            document.body.appendChild(ele);
        }
        function btn2(){
            let form1=document.getElementById('form1');
         let form2=document.getElementById('form2');
       if(form1!=null){
           document.body.removeChild(form1);
       }
       if(form2!=null){
           return;
       }
            let ele=document.createElement('div');
            ele.setAttribute('id','form2');
            let txt1=document.createElement('input');
            txt1.type='email';
            txt1.setAttribute('id','txt101');
            txt1.setAttribute('placeholder','Enter Email');
            ele.appendChild(txt1);
            let btn=document.createElement('button');
            btn.setAttribute('onclick','display2()');
            btn.setAttribute('class','mybtnstyle');
            btn.innerText='Get Email';
            ele.appendChild(btn);
            document.body.appendChild(ele);
        }
    </script>
</html>
