<script>
    var str="xnyqwxyyxeykjfyx";
    let countX=0;
    let countY=0;
    for(let i=0;i<str.length;i++){
        let ch=str.charAt(i);
        if(ch=='x'){
            countX++;
        }else if(ch=='y'){
            countY++;
        }
    }
    console.log(`x =${countX} \ny =${countY} `);
</script>
