<script>
    let str="EDUFECT";
    let s1="";
    for(let i=0;i<str.length;i++){
        let ch=str.charAt(i);
        if(ch=='E'){
           s1=s1+ '#';
        }else{
            s1=s1+ch;
        }
        console.log(s1);
    }
    console.log(`New String With E replaced by # is ${s1}`);
</script>
