<html>
    <head></head>
    <body>
        <button onclick="getNumber()">Get Number</button>
    </body>
    <script>
        let urlnum="https://us-central1-fytpo-f6ed3.cloudfunctions.net/app/bins/1c3wng";
             function getNumber(){
                 getData(urlnum,showNumber);
             }
             function showNumber(data){
                 console.log(data);
                 let sum=0;
                 for(let i=0;i<data.length;i++){
                      sum+=data[i];
                 }
                 console.log(sum);
             }
             function getData(url,fnResponse){
            fetch(url)
            .then(response=>{
                return response.json();
            })
            .then(fnResponse)
            .catch(err=>console.log(err));
        }
    </script>
</html>
