    <script>
        let urlname="https://us-central1-fytpo-f6ed3.cloudfunctions.net/app/bins/1g7sq4";
        let urldetails="https://us-central1-fytpo-f6ed3.cloudfunctions.net/app/bins/16r07g";

        function getName(){
            getData(urlname,showNames);

        function showNames(data){
            console.log("names :",data);
            let len=data.length;

                console.log(data[i]);
        }
        }
        function getDetails(){
