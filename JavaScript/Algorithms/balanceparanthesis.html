<script>
    function fun(){
        var expression=document.getElementById('para').value;
          if(expression.length<=0)
              console.log("false");
          
          var bracket,temp;
          var stack=[];
          var openBracket=['(','{','['];
          var closeBracket=[')','}',']'];

          for(var i=0;i<expression.length;i++){
               temp=expression[i]
               if(closeBracket.indexOf(temp)>-1){
                   bracket=openBracket[closeBracket.indexOf(temp)]
                   if(stack.length==0 || (stack.pop!=bracket)){
                       console.log('false')
                   }
               }else{
                   stack.push(temp)
               }
          }
          console.log(stack.length==0)
    };
</script>
<input type="text"  id="para"><br><br>
<button onclick="fun()">Click Here</button>
